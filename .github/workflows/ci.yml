name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend linter
        working-directory: ./frontend
        run: npm run lint || true

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test:run

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./frontend/coverage
          flags: unittests
          name: frontend-coverage
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # Backend Tests (Unit/Integration)
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install backend dependencies
        working-directory: ./api
        run: bun install

      - name: Run backend tests
        working-directory: ./api
        env:
          TEST_DB_URI: mongodb://localhost:27017/todo-app-test
          JWT_SECRET: test-secret-for-ci
          DATABASE_URL: mongodb://localhost:27017/todo-app-test
        run: bun test || echo "No tests configured"

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit on frontend
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

      - name: Run npm audit on backend
        working-directory: ./api
        run: npm audit --audit-level=high || true

  # Build Check
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Verify build output
        run: |
          ls -la frontend/dist
          test -f frontend/dist/index.html && echo "Frontend build OK"

  # Deploy Preview (optional - for PRs)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const buildComment = comments.find(c => c.body.includes('Build Status'));
            const body = 'Build Status: ✅ Passed\n\nFrontend build completed successfully.';
            
            if (buildComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: buildComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # Report Coverage
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: Vitest" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage target: 80%" >> $GITHUB_STEP_SUMMARY
          echo "- Run: \`npm run test:coverage\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: Bun Test" >> $GITHUB_STEP_SUMMARY
          echo "- Run: \`bun test\` in api directory" >> $GITHUB_STEP_SUMMARY

  # Notify Status
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, build]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.frontend-test.result }}" == "failure" ]] || [[ "${{ needs.backend-test.result }}" == "failure" ]] || [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

      - name: Create commit status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: 'CI ' + status,
              context: 'ci/status',
            });

